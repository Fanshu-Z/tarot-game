<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘塔罗 · 占卜之旅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: #e0d4fc;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(147, 112, 219, 0.5);
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #b8a8d8;
            font-style: italic;
        }

        .controls {
            text-align: center;
            margin: 30px 0;
        }

        .btn {
            background: linear-gradient(135deg, #6b4c9a 0%, #4a2c7a 100%);
            color: white;
            border: 2px solid #9370db;
            padding: 15px 40px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 50px;
            margin: 0 10px;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: linear-gradient(135deg, #7b5caa 0%, #5a3c8a 100%);
            box-shadow: 0 0 20px rgba(147, 112, 219, 0.6);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #333;
            border-color: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .spread-selector {
            margin: 20px 0;
        }

        .spread-selector select {
            background: rgba(107, 76, 154, 0.3);
            color: #e0d4fc;
            border: 2px solid #9370db;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Georgia', serif;
        }

        .spread-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
            min-height: 400px;
        }

        .card-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-label {
            margin-top: 15px;
            font-size: 0.9em;
            color: #b8a8d8;
            text-align: center;
            min-height: 40px;
        }

        .card {
            width: 200px;
            height: 320px;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.reversed .card-inner {
            transform: rotateY(180deg) rotateZ(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .card-back {
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
            border: 3px solid #9370db;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back-pattern {
            width: 80%;
            height: 80%;
            border: 2px solid #6b4c9a;
            border-radius: 10px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(147, 112, 219, 0.1) 10px,
                rgba(147, 112, 219, 0.1) 20px
            );
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back-symbol {
            font-size: 3em;
            color: #9370db;
            text-shadow: 0 0 10px rgba(147, 112, 219, 0.5);
        }

        .card-front {
            transform: rotateY(180deg);
            background: #1a0a2e;
            border: 3px solid #c9a227;
        }

        .card-image {
            width: 100%;
            height: 85%;
            object-fit: cover;
        }

        .card-name {
            height: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0a2e 100%);
            font-size: 0.9em;
            color: #e0d4fc;
            text-align: center;
            padding: 5px;
            border-top: 2px solid #c9a227;
        }

        .meaning-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .meaning-modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
            border: 3px solid #9370db;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            color: #9370db;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #e0d4fc;
        }

        .modal-title {
            font-size: 1.8em;
            color: #c9a227;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #9370db;
            padding-bottom: 15px;
        }

        .modal-position {
            font-size: 1.2em;
            color: #b8a8d8;
            text-align: center;
            margin-bottom: 20px;
            font-style: italic;
        }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-section h3 {
            color: #9370db;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .modal-section p {
            line-height: 1.6;
            color: #e0d4fc;
        }

        .reversed-badge {
            background: linear-gradient(135deg, #4a1c1c 0%, #2d0f0f 100%);
            color: #ff6b6b;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .shuffle-animation {
            animation: shuffle 0.5s ease-in-out;
        }

        @keyframes shuffle {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-20px) rotate(-5deg); }
            75% { transform: translateX(20px) rotate(5deg); }
        }

        .instructions {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(107, 76, 154, 0.2);
            border-radius: 10px;
            font-size: 0.95em;
        }

        @media (max-width: 768px) {
            .card {
                width: 140px;
                height: 224px;
            }

            .spread-area {
                gap: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .btn {
                padding: 12px 25px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <header>
            <h1>神秘塔罗</h1>
            <p class="subtitle">聆听内心的声音 · 探索命运的指引</p>
        </header>

        <div class="controls">
            <div class="spread-selector">
                <select id="spreadType">
                    <option value="one">单牌指引</option>
                    <option value="three" selected>时间三牌阵（过去-现在-未来）</option>
                </select>
            </div>
            <button class="btn" id="shuffleBtn" onclick="shuffleDeck()">洗牌</button>
            <button class="btn" id="drawBtn" onclick="drawCards()" disabled>抽牌</button>
            <button class="btn" id="resetBtn" onclick="resetGame()">重新开始</button>
        </div>

        <div class="instructions" id="instructions">
            点击"洗牌"开始，然后点击"抽牌"获取你的塔罗指引
        </div>

        <div class="spread-area" id="spreadArea"></div>
    </div>

    <div class="meaning-modal" id="meaningModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-position" id="modalPosition"></p>
            <div class="modal-section">
                <h3>关键词</h3>
                <p id="modalKeywords"></p>
            </div>
            <div class="modal-section">
                <h3>牌面解读</h3>
                <p id="modalMeaning"></p>
            </div>
            <div class="modal-section">
                <h3>人生启示</h3>
                <p id="modalAdvice"></p>
            </div>
        </div>
    </div>

            const starsContainer = document.getElementById('stars');

                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

            "宝剑侍从.jpg": "https://s.coze.cn/image/p9C9GpaI8lw/",
            "剑骑士.jpg": "https://s.coze.cn/image/TlPPfKaZ3Iw/",
            "剑后银月.jpg": "https://s.coze.cn/image/tGleMmJHT7c/",
            "宝剑国王.jpg": "https://s.coze.cn/image/qVORLM1hBNc/",
            "星币首牌.jpg": "https://s.coze.cn/image/x-TrOSuGGNU/",
            "双币侍者.jpg": "https://s.coze.cn/image/8dXGYyx19XY/",
            "星币三.jpg": "https://s.coze.cn/image/WczorIxrK9Q/",
            "星币四.jpg": "https://s.coze.cn/image/LGmfyaxHH4s/",
            "五芒星五号牌.jpg": "https://s.coze.cn/image/Fd70gKLhuiI/",
            "六便士牌.jpg": "https://s.coze.cn/image/gFkw5jcz_wY/",
            "星币七.jpg": "https://s.coze.cn/image/SpwqjdlQAWU/",
            "八星币雕刻.jpg": "https://s.coze.cn/image/6iQ7tDRK82M/",
            "星币九.jpg": "https://s.coze.cn/image/_7cpmBgImcU/",
            "星币十.jpg": "https://s.coze.cn/image/lCwwxk_aBoY/",
            "星币侍从.jpg": "https://s.coze.cn/image/W30baUwAWOI/",
            "土骑士.jpg": "https://s.coze.cn/image/N12oHz1b-pE/",
            "星币皇后.jpg": "https://s.coze.cn/image/xnbP6DRGFXg/",
            "星币国王.jpg": "https://s.coze.cn/image/qEM1g59ifnA/"
        };

        let shuffledDeck = [];
        let drawnCards = [];
        let isShuffled = false;

        // 洗牌算法
        function shuffleDeck() {
            const spreadArea = document.getElementById('spreadArea');
            const cards = document.querySelectorAll('.card');

            // 添加洗牌动画
            cards.forEach(card => {
                card.classList.add('shuffle-animation');
                setTimeout(() => card.classList.remove('shuffle-animation'), 500);
            });

            setTimeout(() => {
                // Fisher-Yates 洗牌算法
                shuffledDeck = [...tarotDeck];
                for (let i = shuffledDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledDeck[i], shuffledDeck[j]] = [shuffledDeck[j], shuffledDeck[i]];
                }

                drawnCards = [];
                isShuffled = true;

                document.getElementById('shuffleBtn').disabled = true;
                document.getElementById('drawBtn').disabled = false;
                document.getElementById('instructions').textContent = '牌组已洗好，点击"抽牌"开始占卜';
                createCardSlots();
            }, 500);
        }

        // 创建卡牌槽位
        function createCardSlots() {
            const spreadArea = document.getElementById('spreadArea');
            const spreadType = document.getElementById('spreadType').value;

            spreadArea.innerHTML = '';
            drawnCards = [];

            const positions = spreadType === 'one'
                ? [{ label: '指引', meaning: '今日占卜结果' }]
                : [
                    { label: '过去', meaning: '影响你过去的因素' },
                    { label: '现在', meaning: '当前的状况' },
                    { label: '未来', meaning: '可能的走向' }
                ];

            positions.forEach((pos, index) => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="card" id="card-${index}">
                        <div class="card-inner">
                            <div class="card-front">
                                <img src="" alt="" class="card-image">
                                <div class="card-name"></div>
                            </div>
                            <div class="card-back">
                                <div class="card-back-pattern">
                                    <span class="card-back-symbol">✦</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-label">${pos.label}</div>
                `;
                spreadArea.appendChild(slot);
                drawnCards.push(null);
            });
        }

        // 抽牌
        function drawCards() {
            const spreadType = document.getElementById('spreadType').value;
            const cardCount = spreadType === 'one' ? 1 : 3;

            for (let i = 0; i < cardCount; i++) {
                if (shuffledDeck.length > 0) {
                    // 随机选择正逆位（65%正位，35%逆位）
                    const isReversed = Math.random() > 0.65;
                    const card = shuffledDeck.pop();
                    // 使用 isReversedPosition 标记牌面是否逆位，避免与 reversed 属性冲突
                    card.isReversedPosition = isReversed;
                    drawnCards[i] = card;

                    // 更新卡片
                    const cardElement = document.getElementById(`card-${i}`);
                    const imageUrl = imageUrlMap[card.image] || 'https://s.coze.cn/image/0uqV6jiiFTg/';

                    cardElement.querySelector('.card-image').src = imageUrl;
                    cardElement.querySelector('.card-image').alt = card.name;
                    cardElement.querySelector('.card-name').textContent = card.name + (isReversed ? '（逆位）' : '');

                    // 翻转卡片
                    setTimeout(() => {
                        cardElement.classList.add('flipped');
                        if (isReversed) {
                            cardElement.classList.add('reversed');
                        }
                    }, i * 300);
                }
            }

            document.getElementById('drawBtn').disabled = true;
            document.getElementById('instructions').textContent = '点击卡片查看详细解读';

            // 添加点击事件显示解读
            setTimeout(() => {
                drawnCards.forEach((card, index) => {
                    if (card) {
                        const cardElement = document.getElementById(`card-${index}`);
                        cardElement.onclick = () => showMeaning(index);
                    }
                });
            }, cardCount * 300 + 300);
        }

        // 显示解读
        function showMeaning(index) {
            const card = drawnCards[index];
            if (!card) {
                console.log('Card not found at index:', index);
                return;
            }

            const spreadType = document.getElementById('spreadType').value;
            const positions = spreadType === 'one'
                ? [{ label: '指引', meaning: '今日占卜结果' }]
                : [
                    { label: '过去', meaning: '影响你过去的因素' },
                    { label: '现在', meaning: '当前的状况' },
                    { label: '未来', meaning: '可能的走向' }
                ];

            const positionInfo = positions[index];
            // 使用 isReversedPosition 判断是否逆位，避免与 reversed 属性冲突
            const cardData = card.isReversedPosition ? card.reversed : card.upright;

            console.log('Card:', card);
            console.log('Card.isReversedPosition:', card.isReversedPosition);
            console.log('Card data to display:', cardData);

            // 检查数据是否存在
            if (!cardData || !cardData.keywords) {
                console.error('Card data is missing:', cardData);
                alert('该牌的解读数据缺失，请检查代码配置。');
                return;
            }

            document.getElementById('modalTitle').innerHTML =
                card.name + (card.isReversedPosition ? '<span class="reversed-badge">逆位</span>' : '');
            document.getElementById('modalPosition').textContent = positionInfo.label + ' — ' + positionInfo.meaning;
            document.getElementById('modalKeywords').textContent = cardData.keywords;
            document.getElementById('modalMeaning').textContent = cardData.meaning;
            document.getElementById('modalAdvice').textContent = cardData.advice;

            document.getElementById('meaningModal').classList.add('show');
        }

        // 关闭解读窗口
        function closeModal() {
            document.getElementById('meaningModal').classList.remove('show');
        }

        // 重置游戏
        function resetGame() {
            shuffledDeck = [];
            drawnCards = [];
            isShuffled = false;

            document.getElementById('shuffleBtn').disabled = false;
            document.getElementById('drawBtn').disabled = true;
            document.getElementById('instructions').textContent = '点击"洗牌"开始，然后点击"抽牌"获取你的塔罗指引';
            document.getElementById('spreadArea').innerHTML = '';
        }

        // 初始化
        window.onload = function() {
            createCardSlots();
        };
    </script>
